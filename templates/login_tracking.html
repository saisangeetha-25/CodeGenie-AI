<!DOCTYPE html>
<html>
<body>

<h2>Login Tracking 🔍</h2>

{% for r in records %}
<div style="border:1px solid black; padding:10px; margin:10px;">
<p><b>User:</b> {{ r.username }}</p>
<p><b>Login:</b> {{ r.login_time }}</p>
<p><b>Logout:</b> {{ r.logout_time }}</p>
<p><b>Status:</b> {{ r.status }}</p>
<p><b>Session:</b> {{ r.duration }}</p>
</div>
{% endfor %}

</body>
</html>
