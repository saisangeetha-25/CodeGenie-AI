<!DOCTYPE html>
<html>
<head>
<title>Admin Register</title>
<style>
body{
background:#0f172a;
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:white;
}

.container{
background:#1e293b;
padding:40px;
border-radius:12px;
width:350px;
text-align:center;
}

input{
width:100%;
padding:10px;
margin:10px 0;
border:none;
border-radius:6px;
}

button{
width:100%;
padding:10px;
background:#00c3ff;
border:none;
color:white;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#009ad6;
}
</style>
</head>

<body>

<div class="container">
<h2>Admin Register</h2>

<form method="POST">
<input type="text" name="username" placeholder="Username" required>
<input type="password" name="password" placeholder="Password" required>

<button type="submit">Register</button>
</form>
</div>

</body>
</html>
