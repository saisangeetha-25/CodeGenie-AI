<!DOCTYPE html>
<html>
<body>

<h2>User History 📜</h2>

<form method="GET">
<input type="text" name="user" placeholder="Search user">
<button type="submit">Search</button>
</form>

{% for r in records %}
<div style="border:1px solid black; padding:10px; margin:10px;">
<p><b>User:</b> {{ r.username }}</p>
<p><b>Question:</b> {{ r.question }}</p>
<pre>{{ r.code }}</pre>
</div>
{% endfor %}

</body>
</html>
