<!DOCTYPE html>
<html>
<head>
<title>User Login</title>
<style>
body{
background:#0f172a;
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:white;
}
.container{
background:#1e293b;
padding:40px;
border-radius:12px;
width:350px;
text-align:center;
}
input{
width:100%;
padding:10px;
margin:10px 0;
border:none;
border-radius:6px;
}
button{
width:100%;
padding:10px;
background:#00c3ff;
border:none;
color:white;
border-radius:6px;
cursor:pointer;
}
button:hover{
background:#009ad6;
}
a{
color:#00c3ff;
text-decoration:none;
}
</style>
</head>

<body>
<div class="container">
<h2>User Login</h2>

<form method="POST">
<input type="email" name="username" placeholder="Enter Email" required>
<input type="password" name="password" placeholder="Password" required>

<button type="submit">Login</button>
</form>

<p>New User? <a href="/register">Register here</a></p>
</div>
</body>
</html>
